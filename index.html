<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AI-Image-Usage-Check · Mets Labs</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root { color-scheme: dark; }
  html,body,#root{min-height:100%;background-color:#000000;}
  body{
    color:#e7e7ea;
    font-family:'Inter','Pretendard',ui-sans-serif,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    background-color:#000000;
    background-image:none;
  }
  .mono{font-family:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;}
  .chip{border:1px solid rgba(255,255,255,0.16);}
  .glass{background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.14);}
  .btn{transition:all .2s cubic-bezier(.2,.7,.2,1);}
  .opt{transition:all .25s cubic-bezier(.2,.7,.2,1);box-shadow:0 1px 0 rgba(255,255,255,0.03) inset;}
  .opt:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.06);}

  /* question transitions */
  .q-enter{animation:qIn .55s cubic-bezier(.2,.7,.2,1) both;}
  .q-exit{animation:qOut .35s cubic-bezier(.7,.0,.8,.3) both;}
  .q-exit-back{animation:qOutBack .28s cubic-bezier(.7,.0,.8,.3) both;}
  @keyframes qIn { from{opacity:0;transform:translateY(28px);} to{opacity:1;transform:none;} }
  @keyframes qOut{ from{opacity:1;transform:none;} to{opacity:0;transform:translateY(-28px);} }
  @keyframes qOutBack{ from{opacity:1;transform:none;} to{opacity:0;transform:translateX(48px);} }

  .fade-in{animation:fi .6s ease both;}
  @keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  .stagger-up{opacity:0;transform:translateY(32px);animation:stUp .7s cubic-bezier(.2,.7,.2,1) forwards;}
  @keyframes stUp{to{opacity:1;transform:none;}}



  .reveal{animation:rv .9s cubic-bezier(.2,.7,.2,1) both;}
  @keyframes rv{from{opacity:0;transform:scale(.97);filter:blur(6px);}to{opacity:1;transform:none;filter:none;}}

  .dot{animation:dot 1.4s infinite ease-in-out;}
  .dot:nth-child(2){animation-delay:.2s;}
  .dot:nth-child(3){animation-delay:.4s;}
  @keyframes dot{0%,80%,100%{opacity:.2;transform:translateY(0);}40%{opacity:1;transform:translateY(-4px);}}

  .scan{position:relative;overflow:hidden;}
  .scan::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);transform:translateX(-100%);animation:scan 1.8s infinite;}
  @keyframes scan{to{transform:translateX(100%);}}

  .gauge-track{stroke:rgba(255,255,255,0.06);}

  .print-only{display:none;}
  @media print{
    @page{size:A4;margin:14mm;}
    html,body,#root{background:#ffffff !important;color:#1a1a1a !important;}
    body{background-image:none !important;}
    .no-print{display:none !important;}
    .print-only{display:block !important;}
    .print-header{display:flex !important;justify-content:space-between;align-items:center;padding-bottom:10mm;margin-bottom:8mm;border-bottom:1px solid #1a1a1a;}
    .print-container{color:#1a1a1a !important;max-width:none !important;padding:0 !important;}
    .print-container *{color:#1a1a1a !important;}
    .print-container .print-keep-color{color:unset !important;}
    .print-container [style*="background"]{background:#ffffff !important;}
    .print-container [style*="border"]{border-color:#1a1a1a !important;}
    .print-container .gauge-track{stroke:#e5e5e5 !important;}
    .print-container .summary-box{background:#ffffff !important;border:2px solid var(--tier-color) !important;box-shadow:none !important;}
    .print-avoid-break{break-inside:avoid;page-break-inside:avoid;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

/* ---------- Tool DB ---------- */
const TOOLS = {
  firefly:    { label:"Adobe Firefly",           tier:"green",  sub:"IP 면책" },
  dalle_api:  { label:"DALL·E Enterprise / API", tier:"green",  sub:"Copyright Shield" },
  dalle_plus: { label:"DALL·E Free / Plus",      tier:"yellow", sub:"면책 없음" },
  mj_paid:    { label:"Midjourney 유료",          tier:"yellow", sub:"면책 없음" },
  sd:         { label:"Stable Diffusion",        tier:"orange", sub:"학습셋 불분명" },
  nanobanana: { label:"NanoBanana",              tier:"orange", sub:"학습셋 불분명" },
  free_any:   { label:"무료 생성기 / 크랙",       tier:"red",    sub:"상업 불가" },
};
const TIER = {
  green:  { name:"Green",  hex:"#34d399", label:"안전" },
  yellow: { name:"Yellow", hex:"#facc15", label:"조건부" },
  orange: { name:"Orange", hex:"#fb923c", label:"주의" },
  red:    { name:"Red",    hex:"#f87171", label:"차단" },
};

/* ---------- Scoring ---------- */
function evaluate(s){
  if(s.source === "unknown")
    return { score:8, tier:"red", reasons:["원본 출처 불분명"] };
  if(s.tool === "free_any")
    return { score:10, tier:"red", reasons:["무료·크랙 생성기 — 라이선스 부재"] };
  if(s.source === "owned" && s.aiEdit === "no")
    return { score:98, tier:"green", reasons:["직접 제작 · AI 미개입"] };

  const w = { source:40, tool:30, prompt:15, human:10, purpose:5 };
  const sourceScore = s.source === "owned" ? 100 : 80;
  const toolScore = ({green:100, yellow:70, orange:45, red:0})[TOOLS[s.tool]?.tier ?? "orange"];
  const promptScore = s.prompt === "clean" ? 100 : s.prompt === "mild" ? 55 : 10;
  const humanScore = ({none:50, light:70, heavy:95})[s.human];
  const purposeScore = s.purpose === "internal" ? 100 : s.purpose === "noncom" ? 80 : s.purpose === "commercial" ? 55 : 25;
  const score = Math.round((sourceScore*w.source + toolScore*w.tool + promptScore*w.prompt + humanScore*w.human + purposeScore*w.purpose)/100);

  const reasons = [];
  reasons.push(s.source === "owned" ? "원본 권리 확보" : "100% AI 생성물");
  reasons.push(`${TOOLS[s.tool].label} · ${TIER[TOOLS[s.tool].tier].name}`);
  if(s.prompt === "risky") reasons.push("프롬프트 침해 위험");
  if(s.purpose === "ad") reasons.push("광고 노출 · 최고 위험 등급");
  else if(s.purpose === "commercial" && TOOLS[s.tool].tier !== "green") reasons.push("상업 목적 · 면책 툴 권장");
  if(s.human === "heavy") reasons.push("리터칭 비중 높음");

  let tier;
  if(score >= 85) tier = "green";
  else if(score >= 65) tier = "yellow";
  else if(score >= 40) tier = "orange";
  else tier = "red";
  if(s.purpose === "ad" && tier !== "red") tier = tier === "green" ? "orange" : tier === "yellow" ? "orange" : "red";
  if((s.purpose === "commercial" || s.purpose === "ad") && TOOLS[s.tool].tier === "orange" && tier === "yellow") tier = "orange";
  if(s.prompt === "risky" && tier === "green") tier = "yellow";

  return { score, tier, reasons };
}

function experts(s){
  const t = TOOLS[s.tool]?.tier;
  return {
    A: s.source === "unknown"
      ? "출처를 증명할 수 없는 이미지는 어떤 용도로도 쓸 수 없어요. 바로 폐기하세요."
      : t === "green"
        ? "이 이미지가 AI로 만든 것임을 팀 내·외부에 명확히 알리고, 사용한 툴 이름을 계약서에 적어두세요."
        : t === "yellow"
          ? "상표권이나 저작권이 걸릴만한 요소가 이미지에 없는지 한 번 더 눈으로 체크하세요."
          : "이 툴은 학습 데이터 출처가 불확실하니, 클라이언트에게 AI 사용 사실을 미리 알리고 동의를 받아두세요.",
    B: s.aiEdit === "no" && s.source === "owned"
      ? "원본 파일의 촬영 정보(EXIF)만 그대로 두면 됩니다. 추가 기록 불필요."
      : s.prompt === "risky"
        ? "브랜드·연예인·캐릭터 이름은 프롬프트에서 빼고 다시 만드세요. 사용한 AI 모델 버전(v6.0 등)도 함께 기록해두세요."
        : s.human === "heavy"
          ? "작업한 PSD·레이어 파일을 그대로 보관하면 '직접 만들었다'는 증거가 됩니다. 프롬프트와 시드 번호도 따로 적어두세요."
          : "나중에 똑같이 다시 뽑을 수 있게 '프롬프트'와 '시드 번호'를 메모장에 적어두고, 사용한 AI 모델 버전도 같이 기록하세요.",
    C: s.purpose === "ad"
      ? "광고·캠페인은 위험도가 가장 높습니다. Green 등급 툴로 교체하고, 법무팀 또는 외부 자문에게 표시·광고법 검토를 받으세요."
      : s.purpose === "commercial"
      ? (t === "green"
          ? "우리 브랜드 가이드라인과 톤앤매너가 잘 맞는지 확인하고, 사용자에게 이질감을 주지 않는지 최종 검토하세요."
          : "제품·UI에 나가기 전에 브랜드 톤앤매너 적합성을 확인하고, 가능하면 더 안전한 툴로 최종본을 교체하세요.")
      : s.purpose === "noncom"
        ? "비상업 용도라면 OK. 게시물 아래 'AI로 만든 이미지' 한 줄만 붙여주세요."
        : "내부용으로만 쓰세요. 외부로 나가기 전엔 이 진단을 한 번 더 돌려 확인하세요.",
  };
}

/* ---------- Tiny atoms ---------- */
const Icon = ({name, className="w-4 h-4"}) => <i data-lucide={name} className={className}></i>;

function Gauge({score, tier}){
  const c = TIER[tier].hex;
  const R = 72, C = 2*Math.PI*R;
  const offset = C - (score/100)*C;
  return (
    <div className="relative w-[200px] h-[200px]">
      <svg viewBox="0 0 160 160" className="w-full h-full -rotate-90">
        <circle cx="80" cy="80" r={R} fill="none" strokeWidth="6" className="gauge-track"/>
        <circle cx="80" cy="80" r={R} fill="none" strokeWidth="6"
          stroke={c} strokeDasharray={C} strokeDashoffset={offset}
          style={{transition:"stroke-dashoffset 1.2s cubic-bezier(.2,.7,.2,1), stroke .4s"}} strokeLinecap="round"/>
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <div className="mono text-5xl font-light tracking-tight" style={{color:c}}>{score}</div>
        <div className="text-[10px] uppercase tracking-[0.3em] text-white/40 mt-2">Safety Index</div>
      </div>
    </div>
  );
}

function GaugeSm({score, tier}){
  const c = TIER[tier].hex;
  const R = 52, C = 2*Math.PI*R;
  const offset = C - (score/100)*C;
  return (
    <div className="relative w-[130px] h-[130px] shrink-0">
      <svg viewBox="0 0 120 120" className="w-full h-full -rotate-90">
        <circle cx="60" cy="60" r={R} fill="none" strokeWidth="5" className="gauge-track"/>
        <circle cx="60" cy="60" r={R} fill="none" strokeWidth="5"
          stroke={c} strokeDasharray={C} strokeDashoffset={offset}
          style={{transition:"stroke-dashoffset 1.2s cubic-bezier(.2,.7,.2,1), stroke .4s"}} strokeLinecap="round"/>
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <div className="mono text-4xl font-light tracking-tight" style={{color:c}}>{score}</div>
        <div className="text-[9px] uppercase tracking-[0.3em] text-white/40 mt-1">Safety</div>
      </div>
    </div>
  );
}

/* ---------- Question schema ---------- */
// Each question returns next-step plan based on answer.
const QUESTIONS = [
  {
    id:"source",
    title:"원본 이미지는 어디서 왔습니까?",
    options:[
      { v:"owned",   label:"직접 제작 · 정식 스톡", tone:"green",  sub:"직접 촬영 · 제작물 또는 유료 라이선스를 확보한 소스" },
      { v:"ai_only", label:"100% AI 생성",         tone:"yellow", sub:"베이스 이미지 없이 오직 프롬프트로만 생성한 결과물" },
      { v:"unknown", label:"출처 불분명",           tone:"red",    sub:"구글 이미지 검색 · 커뮤니티 등 권리 확인이 안 된 소스" },
    ],
  },
  {
    id:"aiEdit",
    title:"AI로 보정하거나 변형했습니까?",
    showIf:(s)=> s.source === "owned",
    options:[
      { v:"no",  label:"AI 미사용",        tone:"green",  sub:"포토샵 · 수작업 등 전통적 보정만 적용" },
      { v:"yes", label:"AI로 보정 / 변형", tone:"yellow", sub:"Generative Fill · img2img · 배경 확장 등 AI 기능 사용" },
    ],
  },
  {
    id:"tool",
    title:"어떤 AI 툴을 사용했습니까?",
    showIf:(s)=> s.source === "ai_only" || (s.source === "owned" && s.aiEdit === "yes"),
    options: Object.entries(TOOLS).map(([k,v])=>({ v:k, label:v.label, sub:v.sub, tone:v.tier })),
    columns:2,
  },
  {
    id:"prompt",
    title:"프롬프트에 어떤 요소가 있었나요?",
    showIf:(s)=> !!s.tool && TOOLS[s.tool].tier !== "red",
    options:[
      { v:"clean", label:"일반 명사만",           tone:"green",  sub:"특정 작가나 브랜드 언급 없는 사물 · 배경 중심의 묘사" },
      { v:"mild",  label:"스타일 레퍼런스",        tone:"yellow", sub:"특정 작가의 화풍이나 브랜드 디자인 스타일을 모방" },
      { v:"risky", label:"상표 · 실존 인물 · 캐릭터", tone:"red",    sub:"나이키 · 미키마우스 · 연예인 등 직접적인 고유명사 포함" },
    ],
  },
  {
    id:"human",
    title:"디자이너 후반 작업은 얼마나?",
    showIf:(s)=> !!s.prompt,
    options:[
      { v:"none",  label:"원본 그대로",      tone:"orange", sub:"AI 출력물을 수정 없이 그대로 사용" },
      { v:"light", label:"경미한 리터칭",    tone:"yellow", sub:"톤 보정 · 크롭 · 간단한 지우기 수준" },
      { v:"heavy", label:"본격 합성 · 재작업", tone:"green",  sub:"레이어 재구성 · 다중 소스 합성 등 창작적 개입" },
    ],
  },
  {
    id:"purpose",
    title:"어디에 사용할 건가요?",
    showIf:(s)=> s.source === "unknown" || (s.source === "owned" && s.aiEdit === "no") || !!s.human,
    options:[
      { v:"internal",   label:"내부용",         tone:"green",  sub:"사내 문서 · 시안 · 내부 공유용 자료" },
      { v:"noncom",     label:"비상업",         tone:"yellow", sub:"블로그 · 교육 자료 등 수익 목적이 없는 게시물" },
      { v:"commercial", label:"상업 · UI",      tone:"orange", sub:"제품 · 서비스 · 앱 UI 등 수익 창출 목적의 노출" },
      { v:"ad",         label:"광고 · 캠페인",   tone:"red",    sub:"배너 · 영상 광고 · SNS 프로모션 등 불특정 다수 대상 송출" },
    ],
  },
];

/* ---------- App ---------- */
function App(){
  const [s, setS] = useState({});
  const [phase, setPhase] = useState("intro"); // intro | quiz | loading | result
  const [qIdx, setQIdx] = useState(0);
  const [exiting, setExiting] = useState(false);

  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });

  // determine current question list (dynamic)
  const activeQuestions = useMemo(()=>QUESTIONS.filter(q => !q.showIf || q.showIf(s)), [s]);
  // current question: next unanswered in active list
  const currentQ = activeQuestions.find(q => s[q.id] === undefined);
  const totalVisible = activeQuestions.length + (currentQ ? 0 : 0);
  // progress: answered / (answered + remaining visible)
  const answered = activeQuestions.filter(q => s[q.id] !== undefined).length;
  const progress = phase === "quiz" ? answered / Math.max(activeQuestions.length, 1) : 0;

  function answer(qid, v){
    setExiting(true);
    setTimeout(()=>{
      const next = { ...s, [qid]:v };
      // cascade: if changing an earlier answer would invalidate later ones — not needed here since linear
      setS(next);
      setExiting(false);
      // check if done after applying
      const remaining = QUESTIONS.filter(q => (!q.showIf || q.showIf(next)) && next[q.id] === undefined);
      if(remaining.length === 0){
        setPhase("loading");
        setTimeout(()=> setPhase("result"), 2600);
      }
    }, 320);
  }

  function goHome(){
    setS({}); setPhase("intro"); setQIdx(0);
  }

  function restart(){
    setS({}); setPhase("quiz"); setQIdx(0);
  }

  function goBack(){
    if(answered === 0) return;
    const lastAnsweredQ = [...activeQuestions].reverse().find(q => s[q.id] !== undefined);
    if(!lastAnsweredQ) return;
    setExiting("back");
    setTimeout(()=>{
      const next = { ...s };
      delete next[lastAnsweredQ.id];
      setS(next);
      setExiting(false);
    }, 280);
  }

  return (
    <div className="min-h-screen flex flex-col justify-center">
      {/* Top bar */}
      <header className="px-8 py-6 flex items-center justify-between no-print">
        <button onClick={goHome} className="flex items-center gap-3 btn hover:opacity-80">
          <div className="w-7 h-7 rounded overflow-hidden" dangerouslySetInnerHTML={{__html:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"><rect fill="#30ff9e" width="500" height="500"/><path fill="#002c56" d="M383.79,352c0,4.42-3.58,8-8,8h-44.14v-172.21l-47.08,129.38,10.95,32.27c1.76,5.19-2.1,10.57-7.58,10.57h-43.9l-47-138.44-45.15,133.01c-1.1,3.24-4.15,5.43-7.58,5.43h-49.33l80.12-236h38.15c3.43,0,6.47,2.18,7.57,5.43l52.46,154.52,58.2-159.95h44.29c4.42,0,8,3.58,8,8v220Z"/></svg>`}}/>
          <div className="mono text-[17px] tracking-[0.12em] text-white">Mets Labs</div>
        </button>
        {phase === "quiz" && (
          <button onClick={restart} className="btn text-[11px] mono tracking-widest text-white/40 hover:text-white flex items-center gap-1.5">
            <Icon name="rotate-ccw" className="w-3 h-3"/> RESET
          </button>
        )}
      </header>

      {/* Progress bar (quiz only) */}
      {phase === "quiz" && (
        <div className="px-8">
          <div className="h-[2px] w-full bg-white/5 rounded-full overflow-hidden">
            <div className="h-full bg-white/80 rounded-full"
              style={{width:`${progress*100}%`, transition:"width .5s cubic-bezier(.2,.7,.2,1)"}}/>
          </div>
        </div>
      )}

      {/* Stage */}
      <main className="flex-1 flex items-center justify-center px-6 py-8">
        {phase === "intro"   && <Intro onStart={()=>setPhase("quiz")} />}
        {phase === "quiz"    && currentQ && (
          <Question key={currentQ.id} q={currentQ} exiting={exiting} onPick={(v)=>answer(currentQ.id, v)} onBack={answered > 0 ? goBack : null} />
        )}
        {phase === "loading" && <Loading/>}
        {phase === "result"  && <Result s={s} onRestart={restart}/>}
      </main>

      <footer className="px-8 py-5 text-[11px] mono tracking-[0.2em] text-white/40 text-center no-print">
        Mets Labs · AI Image Protocol v1.0
      </footer>
    </div>
  );
}

/* ---------- Phases ---------- */
function ScrambleText({word, initial}){
  const CHARS = "&$#*?%ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const GREEN = "#30ff9e";
  const pickAccent = (w) => Math.floor(Math.random() * w.length);
  const [chars, setChars] = useState(() => {
    const a = pickAccent(word);
    return word.split("").map((ch, i) => ({ ch, green: i === a }));
  });
  const mounted = useRef(false);

  useEffect(()=>{
    if(!mounted.current){
      mounted.current = true;
      if(initial) return;
    }
    const duration = 180;
    const tick = 30;
    const start = Date.now();
    const iv = setInterval(()=>{
      const elapsed = Date.now() - start;
      if(elapsed >= duration){
        clearInterval(iv);
        const finalAccent = pickAccent(word);
        setChars(word.split("").map((ch, i) => ({ ch, green: i === finalAccent })));
        return;
      }
      const next = word.split("").map(()=>({
        ch: CHARS[Math.floor(Math.random() * CHARS.length)],
        green: Math.random() < 0.3,
      }));
      setChars(next);
    }, tick);
    return ()=> clearInterval(iv);
  },[word]);

  return (
    <span>
      {chars.map((c, i)=>(
        <span key={i} style={{color: c.green ? GREEN : "#ffffff"}}>{c.ch}</span>
      ))}
    </span>
  );
}

function Intro({onStart}){
  const seq1 = ["AI","Check","Scan","AI"];
  const seq2 = ["Usage","Legal","Rights","Usage"];
  const [w1, setW1] = useState(0);
  const [w2, setW2] = useState(0);

  useEffect(()=>{
    let alive = true;
    const timers = [];
    const runCycle = (startDelay) => {
      let t = startDelay;
      for(let i = 1; i < seq1.length; i++){
        const idx = i;
        timers.push(setTimeout(()=>{ if(alive) setW1(idx); }, t));
        t += 600;
        timers.push(setTimeout(()=>{ if(alive) setW2(idx); }, t));
        t += 600;
      }
      timers.push(setTimeout(()=>{
        if(!alive) return;
        setW1(0);
        setW2(0);
        runCycle(2200);
      }, t + 2200));
    };
    runCycle(1300);
    return ()=>{ alive = false; timers.forEach(clearTimeout); };
  },[]);

  return (
    <div className="w-full max-w-6xl px-6 flex flex-col items-center">
<div className="stagger-up text-[88px] md:text-[132px] font-bold tracking-[0.005em]"
        style={{animationDelay:"150ms", lineHeight:1.2}}>
        <div style={{height:"1.2em"}}>
          <ScrambleText word={seq1[w1]} initial={w1 === 0}/>
          {" "}Image
        </div>
        <div style={{height:"1.2em"}}>
          <ScrambleText word={seq2[w2]} initial={w2 === 0}/>
          {" "}Guide
        </div>
      </div>

      <p className="stagger-up text-white/50 text-base md:text-[17px] mt-10 tracking-tight text-center"
        style={{animationDelay:"350ms"}}>

        style={{animationDelay:"550ms", background:"#30ff9e"}}>

    </div>
  );
}

        desc:"학습 데이터의 권리 관계가 미공개 상태로, 진행 중인 해외 집단소송의 간접 영향권에 놓여 있습니다.\n약관상 적법 사용 책임이 이용자에게 전가되어 있어 상업 노출 시 각별한 주의가 필요합니다."},
      red:{vLabel:"위험", v:"상업 활용 불가",
        desc:"크랙·무단 배포 도구로 산출된 결과물에는 상업 이용권이 원천적으로 성립하지 않습니다.\n형사 책임까지 확장될 수 있으므로 해당 산출물의 즉시 폐기를 권고합니다."},
    };
    f.push({k:"툴", tone:tool.tier, ...toolDesc[tool.tier]});
  }

  // ── Prompt ────────────────────────────────────────────────
  if(s.prompt === "clean"){
    f.push({k:"프롬프트", tone:"green", vLabel:"안전",
      v:"일반적인 단어 구성",
      desc:"특정 작가·브랜드를 지목하지 않은 일반 명사 기반의 프롬프트로, 저작권 분쟁 소지가 낮습니다.\n유사성 판단의 출발점 자체가 성립하기 어려운 안전한 구성입니다."});
  } else if(s.prompt === "mild"){
    f.push({k:"프롬프트", tone:"yellow", vLabel:"주의",
      v:"유사성 리스크 존재",
      desc:`특정 작가 화풍 또는 브랜드 디자인을 레퍼런스한 프롬프트로, 독창성 결여 판단의 소지가 있습니다.\n'수채화 질감' 등 일반적 표현으로 전환하여 유사도를 저감할 것을 권고합니다.${commercial ? "\n상업 배포 시 원작자·경쟁사의 모니터링 강도가 높아 분쟁 촉발 가능성이 증가합니다." : ""}`});
  } else if(s.prompt === "risky"){
    f.push({k:"프롬프트", tone:"red", vLabel:"위험",
      v:"복합 권리 침해 고위험",
      desc:"상표·실존 인물·캐릭터 등 고유명사가 직접 지정되어 상표권·초상권·저작권이 중첩 적용됩니다.\n해당 프롬프트의 고유명사를 전면 제거 후 재생성하는 것이 유일한 해소 경로입니다."});
  }

  // ── Human authorship ──────────────────────────────────────
  if(s.source === "owned" && s.aiEdit === "no"){
    f.push({k:"가공", tone:"green", vLabel:"안전",
      v:"온전한 자체 제작물",
      desc:"AI 개입 없이 완성된 전통적 제작물로, 배타적 권리가 온전히 제작자에게 귀속됩니다.\n별도 증빙 없이도 가장 견고한 법적 방어 기반이 확보된 상태입니다."});
  } else if(s.human === "heavy"){
    f.push({k:"가공", tone:"green", vLabel:"안전",
      v:"창작 기여 충분",
      desc:"레이어 재구성·다중 소스 합성 등 디자이너의 실질적 개입이 충분하여 독자적 창작물로 인정받을 개연성이 높습니다.\nPSD 및 작업 히스토리를 보존하면 유효한 증빙 기반이 됩니다."});
  } else if(s.human === "light"){
    f.push({k:"가공", tone:"yellow", vLabel:"주의",
      v:"가공 수준 미달",
      desc:"톤 보정·크롭 수준의 경미한 변형으로는 실질적 개변으로 인정받기 어렵습니다.\n배경 재구성·다중 소스 합성 등 추가 작업을 통해 창작 기여도를 보강할 것을 권고합니다."});
  } else if(s.human === "none"){
    f.push({k:"가공", tone:"orange", vLabel:"경계",
      v:"창작 개입 없음",
      desc:"AI 산출물을 무가공 상태로 사용할 경우, 독자적 창작물로 인정받을 수 없어 권리 주장이 불가합니다.\n최소한의 편집 레이어를 추가하여 창작 기여도를 확보할 것을 권고합니다."});
  }

  // ── Purpose ───────────────────────────────────────────────
  if(s.purpose === "internal"){
    f.push({k:"목적", tone:"green", vLabel:"안전",
      v:"외부 미공개",
      desc:"외부 공개·배포가 수반되지 않아 권리 분쟁의 구성요건 자체가 발생하지 않습니다.\n사내 시안·내부 검토 한정 용도로 별도 조치 없이 활용 가능합니다."});
  } else if(s.purpose === "noncom"){
    f.push({k:"목적", tone:"yellow", vLabel:"조건부",
      v:"공개 시 표기 의무",
      desc:"비상업 목적이라 하더라도 외부 공개 시점부터 출처 표기 및 AI 생성물 고지 의무가 발생합니다.\n비영리 목적만으로는 면책이 성립하지 않으므로 활용 범위를 명확히 설정해야 합니다."});
  } else if(s.purpose === "commercial"){
    const amp = (s.prompt === "risky" || tool?.tier === "red") ? "\n현재 선택 조합은 복수의 리스크 요인이 중첩되어 있어 배포 전 구성요소 교체가 필수적입니다." : "";
    f.push({k:"목적", tone:"orange", vLabel:"엄격",
      v:"배상 범위 확대",
      desc:`프로덕트·서비스·앱 UI 적용 시 배상액이 매출 연동 구조로 산정되어 리스크 규모가 확대됩니다.\n정밀 검토가 필요하나, 광고 노출 대비 위험도는 상대적으로 낮은 구간입니다.${amp}`});
  } else if(s.purpose === "ad"){
    const amp = (s.prompt === "risky" || tool?.tier === "red") ? "\n현재 선택 조합은 최고 수준의 리스크가 중첩되어 있어 송출 전 전면 교체가 필수적입니다." : "";
    f.push({k:"목적", tone:"red", vLabel:"위험",
      v:"광고 노출 · 최고 위험",
      desc:`배너·영상 광고·SNS 프로모션은 불특정 다수 대상 대규모 송출로, 경쟁사 모니터링에 최우선 노출됩니다.\n표시·광고법 규제가 중첩되며 배상액이 광고비·매출 연동으로 산정되어 피해 규모가 최대화됩니다.${amp}`});
  }

  const kToQid = {"소스":"source", "툴":"tool", "프롬프트":"prompt", "목적":"purpose"};
  f.forEach(item => {
    if(item.k === "가공"){
      item.pick = (s.source === "owned" && s.aiEdit === "no") ? pickLabel("aiEdit") : pickLabel("human");
    } else {
      item.pick = pickLabel(kToQid[item.k]);
    }
  });

  return f;
}

function finalStatement(s, r){
  const tool = TOOLS[s.tool];
  if(s.source === "unknown") return "출처 검증 불가. 전 용도 사용 금지. 검증된 소스로 즉시 대체 필요.";
  if(s.tool === "free_any") return "상업 라이선스 부재. 산출물 폐기 후 정식 도구를 통한 재생성 필수.";
  if(s.source === "owned" && s.aiEdit === "no") return "권리 체인 완전 확보. 용도 제한 없이 활용 가능.";

  if(r.tier === "green") return "전 항목 안전 판정. 상업 배포까지 허용. 증빙 자료 보관으로 충분.";
  if(r.tier === "yellow"){
    if(s.prompt === "risky") return "프롬프트 내 침해 요소가 유일한 리스크 요인. 재생성을 통한 해소 가능.";
    if(tool?.tier === "yellow") return "도구의 면책 부재가 핵심 병목. 프로덕트 적용 시 Green 등급 도구 전환 권고.";
    return "조건부 활용 가능. 증빙 기록 확보 및 계약 조항 보강 필요.";
  }
  if(r.tier === "orange"){
    if(tool?.tier === "orange") return "도구 자체가 리스크의 근본 원인. 외부 납품 비권고, 내부 시안 한정 활용 권고.";
    return "복합 요인으로 인한 리스크 누적. 최종본 교체 또는 법무 검토 필수.";
  }
  return "복수 항목 위반. 현 상태에서의 활용 불가. 전면 재작업 필수.";
}

function Result({s, onRestart}){
  const r = evaluate(s);
  const c = TIER[r.tier].hex;
  const factors = analyzeFactors(s);
  const summary = summarize(s, r);

  return (
    <div className="w-full max-w-4xl reveal py-8 px-6 print-container">
      {/* Print-only header */}
      <div className="print-only print-header">
        <div>
          <div style={{fontSize:"10px", letterSpacing:".3em", fontFamily:"'JetBrains Mono',monospace", color:"#1a1a1a"}}>OFFICIAL DIAGNOSTIC REPORT</div>
          <div style={{fontSize:"18px", fontWeight:700, marginTop:"4px", color:"#1a1a1a"}}>AI Image Usage Guide</div>
        </div>
        <div style={{display:"flex", alignItems:"center", gap:"10px"}}>
          <div style={{width:"28px", height:"28px", borderRadius:"4px", overflow:"hidden"}} dangerouslySetInnerHTML={{__html:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"><rect fill="#30ff9e" width="500" height="500"/><path fill="#002c56" d="M383.79,352c0,4.42-3.58,8-8,8h-44.14v-172.21l-47.08,129.38,10.95,32.27c1.76,5.19-2.1,10.57-7.58,10.57h-43.9l-47-138.44-45.15,133.01c-1.1,3.24-4.15,5.43-7.58,5.43h-49.33l80.12-236h38.15c3.43,0,6.47,2.18,7.57,5.43l52.46,154.52,58.2-159.95h44.29c4.42,0,8,3.58,8,8v220Z"/></svg>`}}/>
          <div style={{fontSize:"13px", fontWeight:700, letterSpacing:".08em", color:"#1a1a1a"}}>Mets Labs</div>
        </div>
      </div>

      {/* Top — Verdict */}
      <div className="text-center print-avoid-break">
        <div className="mono text-[11px] tracking-[0.3em] text-white/40">FINAL VERDICT</div>
        <div className="mt-5 flex justify-center">
          <Gauge score={r.score} tier={r.tier}/>
        </div>
        <div className="mt-4 text-5xl md:text-6xl font-light tracking-[-0.02em]" style={{color:c}}>
          {TIER[r.tier].name}
        </div>
        <div className="mt-2 text-sm mono tracking-[0.3em]" style={{color:`${c}CC`}}>
          {TIER[r.tier].label.toUpperCase()}
        </div>
      </div>

      {/* Middle — Executive Summary */}
      <div className="mt-10 print-avoid-break">
        <div className="mono text-[11px] tracking-[0.3em] text-white/40 text-center mb-4">EXECUTIVE SUMMARY</div>
        <div className="relative rounded-2xl px-8 md:px-10 py-7 overflow-hidden summary-box"
          style={{background:`${c}22`, border:`1px solid ${c}66`, boxShadow:`0 0 48px ${c}28`, "--tier-color":c}}>
          <ul className="space-y-2.5">
            {summary.map((p,i)=>(
              <li key={i} className="flex gap-3 items-start">
                <span className="w-1.5 h-1.5 rounded-full mt-[10px] shrink-0" style={{background:c, opacity:.85}}/>
                <span className="text-[15px] md:text-[16px] leading-[1.65] text-white/90 font-light tracking-[-0.005em]">{p}</span>
              </li>
            ))}
          </ul>
        </div>
      </div>

      {/* Bottom — Diagnostic factor grid */}
      <div className="mt-8 print-avoid-break">
        <div className="mono text-[11px] tracking-[0.3em] text-white/40 text-center mb-4">DIAGNOSTIC FACTORS</div>
        <div className="mx-auto grid grid-cols-1 md:grid-cols-3 gap-4"
             style={{maxWidth: factors.length < 3 ? `${factors.length * 320}px` : "none"}}>
          {factors.map((f,i)=>(
            <div key={i}
              className="rounded-xl px-6 py-5 flex flex-col min-h-[120px]"
              style={{background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.18)", boxShadow:"0 1px 0 rgba(255,255,255,0.04) inset"}}>
              <div className="flex items-center justify-between gap-2 pb-4 mb-4 border-b border-white/10">
                <div className="mono text-[11px] tracking-[0.3em] text-white/50">
                  {f.k.toUpperCase()}
                </div>
                <div className="flex items-center gap-2">
                  <span className="w-2 h-2 rounded-full" style={{background:TIER[f.tone].hex, boxShadow:`0 0 10px ${TIER[f.tone].hex}55`}}/>
                  <span className="text-[12px] font-medium mono tracking-[0.15em]" style={{color:TIER[f.tone].hex}}>{f.vLabel}</span>
                </div>
              </div>
              <div className="flex flex-col">
                {f.pick && (
                  <div className="flex items-center justify-between gap-2 text-[11px] mb-4">
                    <span className="mono text-white/35 tracking-[0.2em]">YOUR PICK</span>
                    <span className="px-2 py-0.5 rounded-md text-white/85 text-right"
                      style={{background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.18)"}}>
                      {f.pick}
                    </span>
                  </div>
                )}
                <div className="text-[14px] font-medium leading-snug mb-2 whitespace-nowrap overflow-hidden text-ellipsis" style={{color:TIER[f.tone].hex}}>{f.v}</div>
                {f.desc && <div className="text-[12.5px] text-white/70 leading-[1.7] tracking-[-0.002em] whitespace-pre-line">{f.desc}</div>}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="mt-8 flex items-center justify-center gap-3 no-print">
        <button onClick={onRestart}
          className="btn text-[11px] mono tracking-[0.3em] text-white/70 hover:text-white inline-flex items-center gap-2 px-6 py-3 rounded-full"
          style={{background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.22)"}}>
          <Icon name="rotate-ccw" className="w-3 h-3"/> 다시 진단하기
        </button>
        <button onClick={()=> window.print()}
          className="btn text-[11px] mono tracking-[0.3em] text-black inline-flex items-center gap-2 px-6 py-3 rounded-full"
          style={{background:"#30ff9e"}}>
          <Icon name="file-down" className="w-3 h-3"/> DOWNLOAD REPORT
        </button>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
